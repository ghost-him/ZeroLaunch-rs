name: Release Build

on:
  push:
    tags:
      - "v*.*.*" # 当推送 v1.0.0 格式的标签时触发
  workflow_dispatch: # 允许手动触发
    inputs:
      skip_release:
        description: "仅构建，不发布 Release"
        required: false
        default: true
        type: boolean
      tag:
        description: "指定版本标签 (例如: v0.5.4)，留空则自动从 git 提取"
        required: false
        type: string

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      release_title: ${{ steps.get_version.outputs.RELEASE_TITLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Copy i18n locales to src-tauri
        uses: ./.github/actions/copy-i18n

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          # 检查是否有用户输入的 tag
          $inputTag = "${{ github.event.inputs.tag }}"

          if (-not [string]::IsNullOrEmpty($inputTag)) {
            # 使用用户输入的 tag
            $tag = $inputTag -replace '^v', ''
            echo "📝 使用用户输入的标签: v$tag"
          } else {
            # 从 git ref 提取 tag
            $tag = $env:GITHUB_REF -replace 'refs/tags/v', ''
            if ([string]::IsNullOrEmpty($tag)) {
              $tag = "0.0.0"
            }
            echo "📝 从 git ref 提取标签: v$tag"
          }

          # 生成 yymmdd 格式的日期
          $date = Get-Date -Format "yyMMdd"
          $releaseTitle = "$date-v$tag"

          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "RELEASE_TITLE=$releaseTitle" >> $env:GITHUB_OUTPUT
          echo "Version: $tag"
          echo "Release Title: $releaseTitle"

      - name: Build all variants
        shell: pwsh
        run: |
          cd xtask
          # 构建所有架构的所有变体
          cargo run --bin xtask build-all --arch all
          cd ..

      - name: List build artifacts
        shell: pwsh
        run: |
          echo "=== Build artifacts ==="
          echo "当前目录: $(Get-Location)"
          # 在根目录查找构建产物（不递归，因为 xtask 会将文件移动到根目录）
          $files = Get-ChildItem -Path . -File | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' }
          if ($files.Count -eq 0) {
            echo "❌ 错误：没有找到任何构建产物！"
            echo "根目录下的所有文件："
            Get-ChildItem -Path . -File | Select-Object -First 30 | ForEach-Object { 
              echo "  - $($_.Name) ($($_.Extension))" 
            }
            exit 1
          }
          echo "找到 $($files.Count) 个构建产物："
          $files | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            echo "  ✅ $($_.Name) ($sizeMB MB)"
          }

      # ==========================================
      # 判断是否需要签名
      # ==========================================
      - name: Check if signing is needed
        id: check_signing
        shell: pwsh
        run: |
          $skipTestSigning = "${{ secrets.SKIP_TEST_SIGNING_ON_AUTO }}" -eq "true"
          $isTestSigning = "${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}" -eq "test-signing"
          $isAutoPush = "${{ github.event_name }}" -eq "push"

          echo "Skip Test Signing on Auto: $skipTestSigning"
          echo "Is Test Signing: $isTestSigning"
          echo "Is Auto Push: $isAutoPush"

          # 判断是否应该跳过签名
          # 条件：开启了跳过测试签名 AND 当前使用测试签名 AND 是自动触发（push tag）
          $shouldSkipSigning = $skipTestSigning -and $isTestSigning -and $isAutoPush

          if ($shouldSkipSigning) {
            echo "🔄 检测到测试签名 + 自动触发，将跳过签名步骤"
            echo "SHOULD_SIGN=false" >> $env:GITHUB_OUTPUT
          } else {
            echo "✅ 将执行签名流程"
            echo "SHOULD_SIGN=true" >> $env:GITHUB_OUTPUT
          }

      # ==========================================
      # SignPath 代码签名集成（条件执行）
      # ==========================================

      - name: Package artifacts for signing
        if: steps.check_signing.outputs.SHOULD_SIGN == 'true'
        id: package-artifacts
        shell: pwsh
        run: |
          echo "📦 打包构建产物用于签名..."

          # 创建临时目录
          $bundleDir = "signing-artifacts"
          New-Item -Path $bundleDir -ItemType Directory -Force | Out-Null

          # 复制所有构建产物到临时目录
          $files = Get-ChildItem -Path . -File | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' }
          foreach ($file in $files) {
            Copy-Item -Path $file.FullName -Destination $bundleDir -Force
            echo "  ✓ 已添加: $($file.Name)"
          }

          echo "✅ 共打包 $($files.Count) 个文件"

      - name: Upload unsigned artifacts to GitHub
        if: steps.check_signing.outputs.SHOULD_SIGN == 'true'
        id: upload-unsigned-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifacts
          path: signing-artifacts/*
          if-no-files-found: error
          retention-days: 7

      - name: Submit to SignPath for code signing
        if: steps.check_signing.outputs.SHOULD_SIGN == 'true'
        id: submit-signing-request
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ secrets.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "${{ secrets.SIGNPATH_PROJECT_SLUG }}"
          signing-policy-slug: "${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}"
          artifact-configuration-slug: "zerolaunch-rs-release"
          github-artifact-id: "${{ steps.upload-unsigned-artifacts.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "signed-artifacts"
          wait-for-completion-timeout-in-seconds: 1800

      - name: List signed artifacts
        if: steps.check_signing.outputs.SHOULD_SIGN == 'true'
        shell: pwsh
        run: |
          echo "=== 已签名的构建产物 ==="
          if (Test-Path "signed-artifacts") {
            $signedFiles = Get-ChildItem -Path "signed-artifacts" -File -Recurse | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' }
            if ($signedFiles.Count -eq 0) {
              echo "❌ 错误：签名目录中没有找到任何文件！"
              exit 1
            }
            echo "找到 $($signedFiles.Count) 个已签名文件："
            $signedFiles | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              echo "  ✅ $($_.Name) ($sizeMB MB)"
            }
          } else {
            echo "❌ 错误：签名输出目录不存在！"
            exit 1
          }

      - name: Move signed artifacts to root
        if: steps.check_signing.outputs.SHOULD_SIGN == 'true'
        shell: pwsh
        run: |
          echo "📦 移动已签名文件到根目录..."

          # 删除原有的未签名文件
          Get-ChildItem -Path . -File | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' } | Remove-Item -Force

          # 移动已签名文件到根目录
          Get-ChildItem -Path "signed-artifacts" -File -Recurse | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' } | ForEach-Object {
            Move-Item -Path $_.FullName -Destination . -Force
            echo "  ✓ $($_.Name)"
          }

          # 清理临时目录
          Remove-Item -Path "signing-artifacts" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "signed-artifacts" -Recurse -Force -ErrorAction SilentlyContinue

          echo "✅ 已签名文件已就绪"

      # ==========================================
      # 跳过签名的处理（直接使用未签名文件）
      # ==========================================
      - name: Use unsigned artifacts (skip signing)
        if: steps.check_signing.outputs.SHOULD_SIGN == 'false'
        shell: pwsh
        run: |
          echo "⚠️  跳过签名步骤，直接使用未签名的构建产物"
          echo "当前工作目录下的构建文件："
          Get-ChildItem -Path . -File | Where-Object { $_.Extension -in '.exe', '.msi', '.zip' } | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            echo "  📦 $($_.Name) ($sizeMB MB)"
          }

      # ==========================================
      # Release Notes 生成
      # 1) 计算上一个 tag，用于生成 compare 链接
      # 2) mikepenz changelog builder：按 commit 前缀分类，作者 @ 由 GitHub API 解析
      # 3) DeepSeek（OpenAI 兼容）生成中文更新摘要
      # 4) 组装最终 release_notes.txt（AI 摘要 + 折叠区分类记录）
      # ==========================================
      - name: Resolve previous tag
        id: prev_tag
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $tag = "v$version"

          # 获取上一个标签（用于 compare 链接与 changelog 起点）
          $previousTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          if ([string]::IsNullOrEmpty($previousTag)) {
            $previousTag = git rev-list --max-parents=0 HEAD
          }

          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "PREVIOUS_TAG=$previousTag" >> $env:GITHUB_OUTPUT
          echo "Previous tag: $previousTag -> $tag"

      # 使用现成 action 生成按前缀分类的变更日志；
      # COMMIT 模式下 #{{AUTHOR}} 为 GitHub 用户名（由 GitHub API 依据提交邮箱解析），
      # 从根本上解决 @ 到错误用户的问题。
      - name: Build categorized changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: "COMMIT"
          fromTag: ${{ steps.prev_tag.outputs.PREVIOUS_TAG }}
          toTag: ${{ steps.prev_tag.outputs.TAG }}
          failOnError: false
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                { "title": "### ✨ 新功能", "labels": ["feat"] },
                { "title": "### 🐛 Bug 修复", "labels": ["fix"] },
                { "title": "### ⚡ 性能优化", "labels": ["perf"] },
                { "title": "### ♻️ 重构", "labels": ["refactor"] },
                { "title": "### 📝 文档", "labels": ["docs"] },
                { "title": "### 🎨 样式", "labels": ["style"] },
                { "title": "### 🧪 测试", "labels": ["test"] },
                { "title": "### 🔧 构建 / CI", "labels": ["build", "ci"] },
                { "title": "### 🧹 杂项", "labels": ["chore", "revert"] },
                { "title": "### 💬 其他", "labels": [] }
              ],
              "commit_template": "- #{{TITLE}} (`#{{MERGE_SHA}}`) @#{{AUTHOR}}",
              "transformers": [
                { "pattern": "\\(`([0-9a-f]{7})[0-9a-f]{33}`\\)", "target": "(`$1`)" },
                { "pattern": " @$", "target": "" }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-\\.]+\\))?(!)?:.*",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "sort": { "order": "ASC", "on_property": "mergedAt" }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 调用 OpenAI 兼容接口（默认 DeepSeek）生成中文更新摘要。
      # 需要配置：secret AI_API_KEY；可选 variable AI_BASE_URL、AI_MODEL。
      # 变更内容通过环境变量传入（不拼接进脚本），避免脚本注入。
      - name: Generate AI summary
        id: ai_summary
        continue-on-error: true
        shell: pwsh
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          CHANGELOG: ${{ steps.build_changelog.outputs.changelog }}
        run: |
          $apiKey = $env:AI_API_KEY
          if ([string]::IsNullOrWhiteSpace($apiKey)) {
            Write-Host "⚠️ 未配置 AI_API_KEY，跳过 AI 摘要生成"
            exit 0
          }

          $baseUrl = if ([string]::IsNullOrWhiteSpace($env:AI_BASE_URL)) { "https://api.deepseek.com" } else { $env:AI_BASE_URL.TrimEnd('/') }
          $model   = if ([string]::IsNullOrWhiteSpace($env:AI_MODEL))    { "deepseek-v4-flash" }       else { $env:AI_MODEL }
          $changelog = $env:CHANGELOG

          if ([string]::IsNullOrWhiteSpace($changelog)) {
            Write-Host "⚠️ 变更日志为空，跳过 AI 摘要生成"
            exit 0
          }

          $systemPrompt = "你是 ZeroLaunch-rs 的发布助手。请根据提供的变更记录，用简体中文写一段面向普通用户的版本更新摘要。要求：突出重点功能与修复，2-3 段，语气自然专业，不要逐条罗列 commit，不要使用 Markdown 标题，直接输出正文。"
          $userPrompt   = "以下是本次版本的变更记录：`n`n$changelog"

          $payload = @{
            model            = $model
            messages         = @(
              @{ role = "system"; content = $systemPrompt },
              @{ role = "user";   content = $userPrompt }
            )
            thinking         = @{ type = "enabled" }
            reasoning_effort = "high"
            stream           = $false
          } | ConvertTo-Json -Depth 8

          $headers = @{ "Authorization" = "Bearer $apiKey" }
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($payload)

          try {
            $resp = Invoke-RestMethod -Uri "$baseUrl/chat/completions" -Method Post -Headers $headers -ContentType "application/json; charset=utf-8" -Body $bytes -ErrorAction Stop
            $summary = $resp.choices[0].message.content
            if (-not [string]::IsNullOrWhiteSpace($summary)) {
              [System.IO.File]::WriteAllText((Join-Path (Get-Location) "ai_summary.md"), $summary.Trim(), (New-Object System.Text.UTF8Encoding($false)))
              Write-Host "✅ AI 摘要生成成功"
            } else {
              Write-Host "⚠️ AI 返回内容为空"
            }
          } catch {
            Write-Host "⚠️ AI 摘要生成失败: $($_.Exception.Message)"
          }

      - name: Assemble release notes
        id: release_notes
        shell: pwsh
        env:
          CHANGELOG: ${{ steps.build_changelog.outputs.changelog }}
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $tag = "${{ steps.prev_tag.outputs.TAG }}"
          $previousTag = "${{ steps.prev_tag.outputs.PREVIOUS_TAG }}"
          $repoPath = "${{ github.repository }}"

          $changelog = $env:CHANGELOG
          if ([string]::IsNullOrWhiteSpace($changelog)) {
            $changelog = "_本次版本无可用的分类变更记录。_"
          }

          # AI 摘要（若生成失败则使用回退文案）
          $aiSummary = "本次更新包含若干改进与修复，详见下方完整更新记录。"
          if (Test-Path "ai_summary.md") {
            $content = Get-Content "ai_summary.md" -Raw
            if (-not [string]::IsNullOrWhiteSpace($content)) {
              $aiSummary = $content.Trim()
            }
          }

          $changelogUrl = "https://github.com/$repoPath/compare/$previousTag...$tag"

          # 使用数组拼接，避免 here-string 在 YAML 块中的缩进/闭合歧义
          $lines = @(
            "## 🤖 更新摘要",
            "",
            $aiSummary,
            "",
            "<details>",
            "<summary>📋 完整更新记录（按类型分类）</summary>",
            "",
            $changelog,
            "",
            "</details>",
            "",
            "**Full Changelog**: $changelogUrl",
            "",
            "## 📦 版本说明",
            "",
            '- **安装版 (`.msi`)**: 提供传统的安装体验，支持深层代码签名。',
            '- **便携版 (`.zip`)**: 无需安装，解压即用，适合移动或绿色版爱好者。',
            '- **命令行工具 (`zerolaunch-cli_*.exe`)**: `zl` 命令行客户端，可通过本地 HTTP API 与 ZeroLaunch 交互（文件名含版本和架构信息）。'
          )
          $releaseNotes = $lines -join "`n"

          # 使用无 BOM 的 UTF-8 写入，避免 Gitee / GitCode 显示乱码
          [System.IO.File]::WriteAllText((Join-Path (Get-Location) "release_notes.txt"), $releaseNotes, (New-Object System.Text.UTF8Encoding($false)))
          echo "RELEASE_NOTES_FILE=release_notes.txt" >> $env:GITHUB_OUTPUT
          echo "Generated release notes"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            *.exe
            *.msi
            *.zip
            release_notes.txt
          if-no-files-found: error
          retention-days: 7

  # =======================================================
  # 独立的 GitHub Release Job
  # =======================================================
  release-github:
    name: Publish to GitHub
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_release == 'false')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.build.outputs.release_title }}
          body_path: release_notes.txt
          files: |
            *.exe
            *.msi
            *.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =======================================================
  # 独立的 Gitee Release Job (带重试机制)
  # =======================================================
  release-gitee:
    name: Publish to Gitee
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_release == 'false')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: .

      - name: Push to Gitee
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_EMAIL: ${{ secrets.GITEE_EMAIL }}
        run: |
          $owner, $repo = "${{ github.repository }}".Split('/')
          git config --global user.name "ghost-him"
          git config --global user.email "$env:GITEE_EMAIL"
          git remote add gitee "https://oauth2:$($env:GITEE_TOKEN)@gitee.com/$owner/$repo.git" || true
          git push gitee HEAD:main --tags -f

      - name: Create Gitee Release with Retry
        shell: pwsh
        env:
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TITLE: ${{ needs.build.outputs.release_title }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # --- 重试机制配置 ---
          $maxRetries = 3
          $retryDelaySeconds = 20
          # --------------------

          # 动态获取仓库所有者和名称
          $owner, $repo = "${{ github.repository }}".Split('/')
          Write-Host "Target Gitee Repository: $owner/$repo"

          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Attempt $i of $maxRetries to create and upload Gitee release..."

              $version = $env:VERSION
              $releaseTitle = $env:RELEASE_TITLE
              $tag = "v$version"
              $releaseNotes = Get-Content -Path "release_notes.txt" -Raw -Encoding UTF8
              $headers = @{"Content-Type" = "application/json"; "Authorization" = "token $env:GITEE_TOKEN"}
              $body = @{tag_name = $tag; name = $releaseTitle; body = $releaseNotes; target_commitish = "main"; prerelease = $false} | ConvertTo-Json

              # 确保幂等性：先删除旧 Release
              try {
                $existingRelease = Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/$owner/$repo/releases/tags/$tag" -Method Get -Headers $headers -ErrorAction SilentlyContinue
                if ($existingRelease) {
                  Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/$owner/$repo/releases/$($existingRelease.id)" -Method Delete -Headers $headers
                  Write-Host "已删除旧的 Gitee Release"
                }
              } catch { Write-Host "没有旧的 Gitee Release 需要删除" }

              # 创建新 Release
              $response = Invoke-RestMethod -Uri "https://gitee.com/api/v5/repos/$owner/$repo/releases" -Method Post -Headers $headers -Body $body
              $releaseId = $response.id
              Write-Host "✅ Gitee Release 创建成功，ID: $releaseId"

              # 上传文件
              $files = Get-ChildItem -Path . -Recurse -Include *.exe,*.msi,*.zip -File
              if ($files.Count -eq 0) { throw "未找到需要上传到 Gitee 的构建产物" }

              foreach ($file in $files) {
                Write-Host "📦 正在上传 $($file.Name) 到 Gitee Release..."
                curl --fail -sS -X POST "https://gitee.com/api/v5/repos/$owner/$repo/releases/$releaseId/attach_files" -F "access_token=$env:GITEE_TOKEN" -F "file=@$($file.FullName)"
                if ($LASTEXITCODE -ne 0) {
                  throw "上传文件 $($file.Name) 到 Gitee 失败"
                }
                Write-Host "✅ 已上传: $($file.Name)"
              }

              Write-Host "✅ Gitee Release 所有文件上传完成"
              break # 成功则跳出循环
            } catch {
              Write-Host "❌ Gitee Release 操作失败: $_"
              if ($i -lt $maxRetries) {
                Write-Host "将在 $retryDelaySeconds 秒后重试..."
                Start-Sleep -Seconds $retryDelaySeconds
              } else {
                Write-Host "❌ 已达到最大重试次数，Gitee 发布失败。"
                throw # 最后一次失败时，抛出异常以使 job 失败
              }
            }
          }

  # =======================================================
  # 独立的 GitCode Release Job (带重试机制)
  # =======================================================
  release-gitcode:
    name: Publish to GitCode
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_release == 'false')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: .

      - name: Push to GitCode
        shell: pwsh
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITCODE_EMAIL: ${{ secrets.GITCODE_EMAIL }}
        run: |
          $owner, $repo = "${{ github.repository }}".Split('/')
          git config --global user.name "ghost-him"
          git config --global user.email "$env:GITCODE_EMAIL"
          git remote add gitcode "https://oauth2:$($env:GITCODE_TOKEN)@gitcode.com/$owner/$repo.git" || true
          git push gitcode HEAD:main --tags -f
      - name: Create GitCode Release with Retry
        shell: pwsh
        env:
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TITLE: ${{ needs.build.outputs.release_title }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          # --- 重试机制配置 ---
          $maxRetries = 3
          $retryDelaySeconds = 30 # GitCode API 可能更慢，延迟稍长
          # --------------------

          # 动态获取仓库所有者和名称
          $owner, $repo = "${{ github.repository }}".Split('/')
          Write-Host "Target GitCode Repository: $owner/$repo"

          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Attempt $i of $maxRetries to create and upload GitCode release..."

              $version = $env:VERSION
              $releaseTitle = $env:RELEASE_TITLE
              $tag = "v$version"
              $token = $env:GITCODE_TOKEN
              $releaseNotes = Get-Content -Path "release_notes.txt" -Raw -Encoding UTF8
              $headers = @{"Private-Token" = $token}

              # 1. 创建或更新 Release（保证幂等：tag 已存在时改用 PATCH 更新）
              $createReleaseUri = "https://gitcode.com/api/v5/repos/$owner/$repo/releases"
              $updateReleaseUri = "https://gitcode.com/api/v5/repos/$owner/$repo/releases/$tag"
              $createBody = @{tag_name = $tag; name = $releaseTitle; body = $releaseNotes} | ConvertTo-Json -Depth 5
              $updateBody = @{name = $releaseTitle; body = $releaseNotes} | ConvertTo-Json -Depth 5
              try {
                Invoke-RestMethod -Uri $createReleaseUri -Method Post -Headers $headers -ContentType "application/json" -Body $createBody -ErrorAction Stop
                Write-Host "✅ GitCode Release 创建成功"
              } catch {
                # 创建失败（大概率 tag 已存在），回退到 PATCH 更新
                Write-Host "⚠️ GitCode Release 创建失败，尝试更新已有 Release: $($_.Exception.Message)"
                Invoke-RestMethod -Uri $updateReleaseUri -Method Patch -Headers $headers -ContentType "application/json" -Body $updateBody -ErrorAction Stop
                Write-Host "✅ GitCode Release 更新成功"
              }

              # 2. 上传文件
              $files = Get-ChildItem -Path . -Recurse -Include *.exe,*.msi,*.zip -File
              if ($files.Count -eq 0) { throw "未找到需要上传到 GitCode 的构建产物" }

              foreach ($file in $files) {
                Write-Host "📦 正在上传 $($file.Name) 到 GitCode Release..."
                $encodedFileName = [Uri]::EscapeDataString($file.Name)
                $getUploadUrlEndpoint = "https://gitcode.com/api/v5/repos/$owner/$repo/releases/$tag/upload_url?access_token=$token&file_name=$encodedFileName"
                $uploadInfo = Invoke-RestMethod -Uri $getUploadUrlEndpoint -Method Get -ErrorAction Stop

                if (-not $uploadInfo.url) { throw "未从 GitCode 获取到上传地址" }

                $putHeaders = @{}
                if ($uploadInfo.headers) {
                  foreach ($key in $uploadInfo.headers.PSObject.Properties.Name) { $putHeaders[$key] = $uploadInfo.headers.$key }
                }

                Invoke-RestMethod -Uri $uploadInfo.url -Method Put -InFile $file.FullName -Headers $putHeaders -ErrorAction Stop
                Write-Host "✅ 已上传: $($file.Name)"
              }

              Write-Host "✅ GitCode Release 所有文件上传完成"
              break # 成功则跳出循环
            } catch {
              Write-Host "❌ GitCode Release 操作失败: $($_.Exception.Message)"
              if ($i -lt $maxRetries) {
                Write-Host "将在 $retryDelaySeconds 秒后重试..."
                Start-Sleep -Seconds $retryDelaySeconds
              } else {
                Write-Host "❌ 已达到最大重试次数，GitCode 发布失败。"
                throw # 最后一次失败时，抛出异常以使 job 失败
              }
            }
          }

  # =======================================================
  # 最终的通知 Job,依赖于所有并行的 release job
  # =======================================================
  notify:
    name: Notify on completion
    needs:
      - release-github
      - release-gitee
      - release-gitcode
    runs-on: ubuntu-latest
    # 无论上游 release job 成功或失败都运行（手动触发且跳过发布时不运行）
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_release == 'false'))
    steps:
      - name: Check status of all release jobs
        run: |
          echo "🔎 Checking status of all release jobs..."

          github_status="${{ needs.release-github.result }}"
          gitee_status="${{ needs.release-gitee.result }}"
          gitcode_status="${{ needs.release-gitcode.result }}"

          echo "  - GitHub Release: $github_status"
          echo "  - Gitee Release:  $gitee_status"
          echo "  - GitCode Release: $gitcode_status"

          if [[ "$github_status" == "success" && "$gitee_status" == "success" && "$gitcode_status" == "success" ]]; then
            echo "✅ All platforms released successfully!"
          else
            echo "❌ One or more platforms failed to release. Please check the logs."
            exit 1
          fi
