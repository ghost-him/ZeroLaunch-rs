<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    const params = new URLSearchParams(location.search);
    const pluginId = params.get('plugin');
    const entry = params.get('entry');

    // CLI connection info, injected by the parent window via postMessage.
    let cliInfo = null;
    let cliInfoReady = new Promise((resolve) => {
      window.addEventListener('message', function onCliInfo(e) {
        if (e.data?.type === 'cli-info') {
          cliInfo = e.data.cliInfo;
          cliInfoReady = Promise.resolve(cliInfo);
          window.removeEventListener('message', onCliInfo);
          resolve(cliInfo);
        }
      });
    });

    window.__zl_host__ = {
      pluginId,

      sendToHost(payload) {
        parent.postMessage({ pluginId, payload }, '*');
      },

      onDataUpdate(callback) {
        window.addEventListener('message', (e) => {
          if (e.data?.type === 'data-update') {
            callback(e.data.data, e.data.actions);
          }
        });
      },

      async callHost(method, params) {
        await cliInfoReady;
        if (!cliInfo) {
          throw new Error('CLI connection info not available');
        }
        const res = await fetch(`http://${cliInfo.host}:${cliInfo.port}/v1/${method}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${cliInfo.token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(params),
        });
        return res.json();
      },
    };

    if (entry) {
      import(/* @vite-ignore */ entry).then(mod => {
        mod.default?.(document.getElementById('root'), window.__zl_host__);
      }).catch(err => {
        document.getElementById('root').textContent = 'Load failed: ' + err.message;
      });
    }
  </script>
</body>
</html>
